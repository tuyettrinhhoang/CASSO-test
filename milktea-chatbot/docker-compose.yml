version: '3.8'

services:
  # Main application
  app:
    build: .
    container_name: milktea-chatbot
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=milktea_db
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_MODEL=${LLM_MODEL:-claude-sonnet-4-20250514}
      - SHOP_NAME=${SHOP_NAME:-Quán Trà Sữa Mẹ}
      - SHOP_OWNER_TELEGRAM_ID=${SHOP_OWNER_TELEGRAM_ID}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - milktea-network

  # PostgreSQL database
  postgres:
    image: postgres:14-alpine
    container_name: milktea-postgres
    environment:
      - POSTGRES_DB=milktea_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - milktea-network

  # Redis cache
  redis:
    image: redis:6-alpine
    container_name: milktea-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - milktea-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  milktea-network:
    driver: bridge
